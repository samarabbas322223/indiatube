        // ============================================================
        // UPLOAD PAGE
        // ============================================================
        function UploadPage({ T, navigate, currentUser, showToast }) {
            const [step, setStep] = useState(1);
            const [form, setForm] = useState({ title: "", description: "", tags: "", category: "Entertainment" });
            const [uploading, setUploading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [dragOver, setDragOver] = useState(false);
            const [selectedFile, setSelectedFile] = useState(null);
            const [aiTitle, setAiTitle] = useState("");
            const [aiLoading, setAiLoading] = useState(false);

            if (!currentUser) return (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "60vh", gap: 16 }}>
                    <Icon name="upload" size={64} />
                    <div style={{ fontSize: 20, fontWeight: 700 }}>Sign in to upload videos</div>
                    <button onClick={() => navigate("login")} style={{ background: T.accent, color: "#fff", border: "none", borderRadius: 20, padding: "12px 24px", fontSize: 16, cursor: "pointer", fontWeight: 700 }}>Sign In</button>
                </div>
            );

            const generateAITitle = async () => {
                if (!form.description && !form.tags) { showToast("Add description or tags first", "error"); return; }
                setAiLoading(true);
                try {
                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 500,
                            messages: [{ role: "user", content: `Generate 3 catchy YouTube video titles for an Indian creator based on:\nCategory: ${form.category}\nDescription: ${form.description}\nTags: ${form.tags}\n\nMake them engaging, clickable, and relevant to Indian audience. Return ONLY the 3 titles, one per line, numbered 1. 2. 3.` }]
                        })
                    });
                    const data = await response.json();
                    setAiTitle(data.content?.[0]?.text || "");
                } catch {
                    showToast("AI title generation failed", "error");
                }
                setAiLoading(false);
            };

            const handleUpload = async () => {
                if (!form.title) { showToast("Please enter a title", "error"); return; }
                if (!selectedFile && step === 1) { showToast("Please select a video file", "error"); return; }
                setUploading(true);
                
                let p = 0;
                const interval = setInterval(() => {
                    p += Math.random() * 15;
                    if (p >= 100) {
                        p = 100;
                        clearInterval(interval);
                        const newVideo = {
                            id: "v_" + Date.now(),
                            title: form.title,
                            channelId: currentUser.id,
                            channelName: currentUser.username,
                            thumbnail: `https://picsum.photos/seed/${Date.now()}/640/360`,
                            duration: "5:00",
                            views: 0,
                            likes: 0,
                            dislikes: 0,
                            comments: [],
                            tags: form.tags.split(",").map(t => t.trim()),
                            category: form.category,
                            description: form.description,
                            uploadDate: new Date().toISOString().split("T")[0],
                            videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
                            isShort: false
                        };
                        FirebaseDB.createVideo(newVideo);
                        setUploading(false);
                        showToast("Video uploaded successfully! 🎉");
                        setTimeout(() => navigate("profile", { userId: currentUser.id }), 1500);
                    }
                    setProgress(p);
                }, 200);
            };

            return (
                <div style={{ maxWidth: 760, margin: "0 auto", padding: "24px 16px 80px" }}>
                    <h1 style={{ fontSize: 22, fontWeight: 800, marginBottom: 24, display: "flex", alignItems: "center", gap: 12 }}>
                        <Icon name="upload" size={28} /> Upload Video
                    </h1>

                    {!selectedFile ? (
                        <div
                            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                            onDragLeave={() => setDragOver(false)}
                            onDrop={e => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer.files[0]; if (f?.type.startsWith("video/")) setSelectedFile(f); else showToast("Please drop a video file", "error"); }}
                            onClick={() => document.getElementById("fileInput").click()}
                            style={{
                                border: `2px dashed ${dragOver ? T.accent : T.border}`, borderRadius: 16, padding: 60, textAlign: "center", cursor: "pointer",
                                background: dragOver ? `${T.accent}10` : T.surface2, transition: "all 0.3s", marginBottom: 24
                            }}>
                            <input id="fileInput" type="file" accept="video/*" style={{ display: "none" }} onChange={e => e.target.files[0] && setSelectedFile(e.target.files[0])} />
                            <Icon name="upload" size={56} />
                            <div style={{ fontSize: 20, fontWeight: 700, marginTop: 16 }}>Drag & drop your video here</div>
                            <div style={{ color: T.textSub, marginTop: 8 }}>or click to browse files</div>
                            <div style={{ color: T.textSub, fontSize: 12, marginTop: 8 }}>MP4, WebM, MOV • Up to 4GB</div>
                        </div>
                    ) : (
                        <div style={{ background: T.surface2, borderRadius: 12, padding: 16, marginBottom: 24, display: "flex", alignItems: "center", gap: 12 }}>
                            <Icon name="play" size={32} />
                            <div style={{ flex: 1 }}>
                                <div style={{ fontWeight: 600 }}>{selectedFile.name}</div>
                                <div style={{ fontSize: 12, color: T.textSub }}>{(selectedFile.size / 1024 / 1024).toFixed(1)} MB</div>
                            </div>
                            <button onClick={() => setSelectedFile(null)} style={{ background: "none", border: "none", color: T.textSub, cursor: "pointer" }}><Icon name="close" size={20} /></button>
                        </div>
                    )}

                    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                        <div>
                            <label style={{ fontSize: 13, fontWeight: 600, marginBottom: 6, display: "block" }}>Title *</label>
                            <input value={form.title} onChange={e => setForm(f => ({ ...f, title: e.target.value }))} placeholder="Give your video a catchy title..." maxLength={100} style={{ width: "100%", background: T.surface2, border: `1px solid ${T.border}`, borderRadius: 8, padding: "10px 14px", color: T.text, fontSize: 14, outline: "none" }} />
                            <div style={{ textAlign: "right", fontSize: 11, color: T.textSub, marginTop: 4 }}>{form.title.length}/100</div>
                        </div>

                        <div>
                            <label style={{ fontSize: 13, fontWeight: 600, marginBottom: 6, display: "block" }}>Description</label>
                            <textarea value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} placeholder="Describe your video..." rows={4} style={{ width: "100%", background: T.surface2, border: `1px solid ${T.border}`, borderRadius: 8, padding: "10px 14px", color: T.text, fontSize: 14, outline: "none", resize: "vertical" }} />
                        </div>

                        <div>
                            <label style={{ fontSize: 13, fontWeight: 600, marginBottom: 6, display: "block" }}>Tags</label>
                            <input value={form.tags} onChange={e => setForm(f => ({ ...f, tags: e.target.value }))} placeholder="india, tech, tutorial (comma separated)" style={{ width: "100%", background: T.surface2, border: `1px solid ${T.border}`, borderRadius: 8, padding: "10px 14px", color: T.text, fontSize: 14, outline: "none" }} />
                        </div>

                        <div>
                            <label style={{ fontSize: 13, fontWeight: 600, marginBottom: 6, display: "block" }}>Category</label>
                            <select value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))} style={{ width: "100%", background: T.surface2, border: `1px solid ${T.border}`, borderRadius: 8, padding: "10px 14px", color: T.text, fontSize: 14, outline: "none" }}>
                                {CATEGORIES.filter(c => c !== "All").map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>

                        <div style={{ background: T.surface2, borderRadius: 12, padding: 16, border: `1px solid ${T.border}` }}>
                            <div style={{ fontWeight: 700, marginBottom: 8, display: "flex", alignItems: "center", gap: 8 }}>✨ AI Title Suggestions</div>
                            <button onClick={generateAITitle} disabled={aiLoading} style={{ background: "linear-gradient(135deg, #ff0000, #cc0044)", color: "#fff", border: "none", borderRadius: 20, padding: "8px 16px", cursor: "pointer", fontSize: 13, fontWeight: 600, marginBottom: aiTitle ? 12 : 0 }}>
                                {aiLoading ? "Generating..." : "Generate AI Titles"}
                            </button>
                            {aiTitle && (
                                <div style={{ fontSize: 13, lineHeight: 2, whiteSpace: "pre-wrap" }}>
                                    {aiTitle.split("\n").filter(Boolean).map((title, i) => (
                                        <div key={i} onClick={() => { const t = title.replace(/^\d+\.\s*/, ""); setForm(f => ({ ...f, title: t })); }} style={{ padding: "4px 8px", borderRadius: 6, cursor: "pointer", color: T.text, transition: "background 0.2s" }}
                                            onMouseEnter={e => e.currentTarget.style.background = T.hover}
                                            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                                            {title}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {uploading ? (
                            <div>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, fontSize: 13 }}>
                                    <span>Uploading...</span><span>{Math.round(progress)}%</span>
                                </div>
                                <div style={{ height: 8, background: T.surface2, borderRadius: 4, overflow: "hidden" }}>
                                    <div style={{ height: "100%", width: `${progress}%`, background: T.accent, borderRadius: 4, transition: "width 0.2s" }} />
                                </div>
                            </div>
                        ) : (
                            <button onClick={handleUpload} style={{ background: T.accent, color: "#fff", border: "none", borderRadius: 20, padding: "14px 32px", fontSize: 16, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 8, justifyContent: "center" }}>
                                <Icon name="upload" size={20} /> Upload Video
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        // ============================================================
        // LOGIN PAGE
        // ============================================================
        function LoginPage({ T, navigate, setCurrentUser, showToast }) {
            const [isLogin, setIsLogin] = useState(true);
            const [form, setForm] = useState({ username: "", email: "", password: "", confirmPassword: "" });
            const [loading, setLoading] = useState(false);
            const [errors, setErrors] = useState({});

            const validate = () => {
                const e = {};
                if (!form.email) e.email = "Email required";
                if (!form.password) e.password = "Password required";
                if (!isLogin) {
                    if (!form.username) e.username = "Username required";
                    if (form.password !== form.confirmPassword) e.confirmPassword = "Passwords don't match";
                    if (form.password.length < 6) e.password = "Min 6 characters";
                }
                return e;
            };

            const handleSubmit = async () => {
                const e = validate();
                setErrors(e);
                if (Object.keys(e).length) return;
                setLoading(true);
                
                try {
                    if (isLogin) {
                        const user = await FirebaseDB.getUserByEmail(form.email);
                        if (user && user.password === form.password) {
                            setCurrentUser(user);
                            showToast(`Welcome back, ${user.username}! 🎉`);
                            navigate("home");
                        } else {
                            setErrors({ email: "Invalid credentials" });
                            showToast("Invalid email or password", "error");
                        }
                    } else {
                        const existingUser = await FirebaseDB.getUserByEmail(form.email);
                        if (existingUser) {
                            setErrors({ email: "Email already registered" });
                            showToast("Email already in use", "error");
                        } else {
                            const newUser = {
                                username: form.username,
                                email: form.email,
                                password: form.password,
                                avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${form.username}`,
                                bio: "New creator on IndiaTube 🇮🇳",
                                subscribers: 0,
                                banner: "#1a1a2e"
                            };
                            const created = await FirebaseDB.createUser(newUser);
                            setCurrentUser(created);
                            showToast(`Welcome to IndiaTube, ${form.username}! 🎉`);
                            navigate("home");
                        }
                    }
                } catch (error) {
                    showToast("Authentication failed", "error");
                }
                setLoading(false);
            };

            const Field = ({ name, type = "text", placeholder, label }) => (
                <div style={{ marginBottom: 16 }}>
                    <label style={{ fontSize: 13, fontWeight: 600, marginBottom: 6, display: "block", color: errors[name] ? "#ff4444" : T.text }}>{label}</label>
                    <input type={type} value={form[name]} onChange={e => setForm(f => ({ ...f, [name]: e.target.value }))} onKeyDown={e => e.key === "Enter" && handleSubmit()} placeholder={placeholder} style={{ width: "100%", background: T.surface2, border: `1px solid ${errors[name] ? "#ff4444" : T.border}`, borderRadius: 10, padding: "12px 16px", color: T.text, fontSize: 14, outline: "none", transition: "border 0.2s" }} />
                    {errors[name] && <div style={{ fontSize: 12, color: "#ff4444", marginTop: 4 }}>{errors[name]}</div>}
                </div>
            );

            return (
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "calc(100vh - 56px)", padding: "24px 16px" }}>
                    <div className="fade-in" style={{ width: "100%", maxWidth: 420, background: T.surface, borderRadius: 20, padding: 32, boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
                        <div style={{ textAlign: "center", marginBottom: 32 }}>
                            <div style={{ background: "#ff0000", borderRadius: 12, padding: "8px 16px", display: "inline-flex", alignItems: "center", gap: 6, marginBottom: 12 }}>
                                <Icon name="play" size={24} />
                                <span style={{ fontWeight: 800, fontSize: 20 }}>IndiaTube</span>
                            </div>
                            <div style={{ color: T.textSub, fontSize: 14 }}>{isLogin ? "Sign in to continue" : "Create your account"}</div>
                        </div>

                        <div style={{ background: T.surface2, borderRadius: 10, padding: 12, marginBottom: 20, fontSize: 12 }}>
                            <div style={{ fontWeight: 600, marginBottom: 6 }}>🎯 Demo Accounts:</div>
                            {MOCK_USERS.slice(0, 2).map(u => (
                                <div key={u.id} onClick={() => setForm(f => ({ ...f, email: u.email, password: u.password }))} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "4px 0", color: T.textSub }}
                                    onMouseEnter={e => e.currentTarget.style.color = T.accent}
                                    onMouseLeave={e => e.currentTarget.style.color = T.textSub}>
                                    <img src={u.avatar} style={{ width: 20, height: 20, borderRadius: "50%" }} alt="" />
                                    {u.email} / pass123
                                </div>
                            ))}
                        </div>

                        {!isLogin && <Field name="username" placeholder="Choose a username" label="Username" />}
                        <Field name="email" type="email" placeholder="your@email.com" label="Email" />
                        <Field name="password" type="password" placeholder="••••••••" label="Password" />
                        {!isLogin && <Field name="confirmPassword" type="password" placeholder="••••••••" label="Confirm Password" />}

                        <button onClick={handleSubmit} disabled={loading} style={{ width: "100%", background: T.accent, color: "#fff", border: "none", borderRadius: 10, padding: 14, fontSize: 16, fontWeight: 700, cursor: "pointer", marginTop: 8, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, opacity: loading ? 0.7 : 1 }}>
                            {loading ? "Please wait..." : (isLogin ? "Sign In 🚀" : "Create Account 🎉")}
                        </button>

                        <div style={{ textAlign: "center", marginTop: 20, color: T.textSub, fontSize: 14 }}>
                            {isLogin ? "New to IndiaTube?" : "Already have an account?"}{" "}
                            <span onClick={() => { setIsLogin(!isLogin); setErrors({}); }} style={{ color: T.accent, cursor: "pointer", fontWeight: 600 }}>
                                {isLogin ? "Create account" : "Sign in"}
                            </span>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================
        // SEARCH PAGE
        // ============================================================
        function SearchPage({ T, query, setQuery, navigate, currentUser, showToast }) {
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [filter, setFilter] = useState("All");
            const [aiAnswer, setAiAnswer] = useState("");
            const [aiLoading, setAiLoading] = useState(false);

            useEffect(() => {
                const searchVideos = async () => {
                    if (!query) {
                        const vids = await FirebaseDB.getVideos();
                        setResults(vids);
                        return;
                    }
                    setLoading(true);
                    const vids = await FirebaseDB.getVideos();
                    const q = query.toLowerCase();
                    const filtered = vids.filter(v =>
                        v.title.toLowerCase().includes(q) || v.channelName.toLowerCase().includes(q) ||
                        v.tags.some(t => t.toLowerCase().includes(q)) || v.category.toLowerCase().includes(q)
                    );
                    setResults(filtered);
                    setLoading(false);
                };
                searchVideos();
            }, [query]);

            const handleAISearch = async () => {
                if (!query) return;
                setAiLoading(true);
                try {
                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 800,
                            messages: [{ role: "user", content: `A user on IndiaTube (Indian YouTube-like platform) searched for: "${query}"\n\nProvide a brief, helpful answer in 2-3 sentences relevant to Indian context. Also suggest 3 related search terms they might find useful. Format: Answer paragraph, then "Related: term1, term2, term3"` }]
                        })
                    });
                    const data = await response.json();
                    setAiAnswer(data.content?.[0]?.text || "");
                } catch {
                    setAiAnswer("");
                }
                setAiLoading(false);
            };

            return (
                <div style={{ maxWidth: 1200, margin: "0 auto", padding: "16px 16px 80px" }}>
                    <div style={{ display: "flex", gap: 0, marginBottom: 20 }}>
                        <input value={query} onChange={e => setQuery(e.target.value)} onKeyDown={e => e.key === "Enter" && handleAISearch()} placeholder="Search IndiaTube…" style={{ flex: 1, background: T.surface2, border: `1px solid ${T.border}`, borderRight: "none", borderRadius: "24px 0 0 24px", padding: "12px 20px", color: T.text, fontSize: 15, outline: "none" }} />
                        <button onClick={() => {}} style={{ background: T.surface2, border: `1px solid ${T.border}`, borderLeft: "none", borderRadius: "0 24px 24px 0", padding: "12px 20px", color: T.textSub, cursor: "pointer" }}>
                            <Icon name="search" size={20} />
                        </button>
                    </div>

                    {query && (
                        <div style={{ marginBottom: 20 }}>
                            {!aiAnswer && !aiLoading && (
                                <button onClick={handleAISearch} style={{ background: "linear-gradient(135deg, #ff0000, #cc0044)", color: "#fff", border: "none", borderRadius: 20, padding: "8px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                                    ✨ Ask AI about "{query}"
                                </button>
                            )}
                            {aiLoading && <div style={{ background: T.surface2, borderRadius: 12, padding: 16 }} className="pulse">🤔 AI is thinking...</div>}
                            {aiAnswer && (
                                <div style={{ background: T.surface2, borderRadius: 12, padding: 16, borderLeft: `3px solid ${T.accent}` }} className="fade-in">
                                    <div style={{ fontWeight: 700, fontSize: 13, color: T.accent, marginBottom: 8 }}>✨ AI Answer</div>
                                    <div style={{ fontSize: 14, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{aiAnswer}</div>
                                </div>
                            )}
                        </div>
                    )}

                    <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 12, marginBottom: 16, scrollbarWidth: "none" }}>
                        {["All", ...CATEGORIES.filter(c => c !== "All"), "Shorts"].map(f => (
                            <button key={f} onClick={() => setFilter(f)} style={{ flexShrink: 0, padding: "6px 14px", borderRadius: 20, border: `1px solid ${T.border}`, cursor: "pointer", fontSize: 13, fontWeight: 500, background: filter === f ? T.text : T.surface2, color: filter === f ? T.bg : T.text }}>
                                {f}
                            </button>
                        ))}
                    </div>

                    {query && <div style={{ fontSize: 13, color: T.textSub, marginBottom: 16 }}>About {results.length} results for "{query}"</div>}

                    {loading ? (
                        <div style={{ textAlign: "center", padding: 40, color: T.textSub }}>Searching...</div>
                    ) : results.length === 0 ? (
                        <div style={{ textAlign: "center", padding: 60 }}>
                            <Icon name="search" size={64} />
                            <div style={{ fontSize: 18, fontWeight: 700, marginTop: 16 }}>No results found</div>
                            <div style={{ color: T.textSub, marginTop: 8 }}>Try different keywords</div>
                        </div>
                    ) : (
                        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                            {results.map(v => (
                                <div key={v.id} onClick={() => navigate(v.isShort ? "shorts" : "watch", { video: v })} className="hover-scale" style={{ display: "flex", gap: 16, cursor: "pointer", padding: "12px 0", borderBottom: `1px solid ${T.border}` }}>
                                    <div style={{ position: "relative", flexShrink: 0, width: v.isShort ? 120 : 240, height: v.isShort ? 200 : 135, borderRadius: 10, overflow: "hidden" }}>
                                        <img src={v.thumbnail} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="" loading="lazy" />
                                        <span style={{ position: "absolute", bottom: 4, right: 4, background: "rgba(0,0,0,0.8)", color: "#fff", fontSize: 11, padding: "1px 4px", borderRadius: 3 }}>{v.duration}</span>
                                        {v.isShort && <span style={{ position: "absolute", top: 4, left: 4, background: "#ff0000", color: "#fff", fontSize: 10, padding: "1px 4px", borderRadius: 3, fontWeight: 700 }}>SHORT</span>}
                                    </div>
                                    <div>
                                        <div style={{ fontWeight: 600, fontSize: 15, lineHeight: 1.4, marginBottom: 6 }}>{v.title}</div>
                                        <div style={{ fontSize: 13, color: T.textSub, marginBottom: 4 }}>{formatViews(v.views)} views • {formatDate(v.uploadDate)}</div>
                                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                                            <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${v.channelName}`} style={{ width: 22, height: 22, borderRadius: "50%" }} alt="" />
                                            <span style={{ fontSize: 13, color: T.textSub }}>{v.channelName}</span>
                                        </div>
                                        <div style={{ fontSize: 13, color: T.textSub, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{v.description}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // ============================================================
        // NOTIFICATIONS PANEL
        // ============================================================
        function NotificationsPanel({ T, onClose, navigate }) {
            const notifs = [
                { id: 1, avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Priya", text: "PriyaMusic uploaded a new video: ‘Bollywood Mix 2025’", time: "2 hours ago", unread: true },
                { id: 2, avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Ankit", text: "TechWithAnkit started a live stream", time: "5 hours ago", unread: true },
                { id: 3, avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Sneha", text: "Someone liked your comment on ‘Mumbai Street Food’", time: "1 day ago", unread: false },
            ];

            return (
                <div className="fade-in" style={{ position: "absolute", top: 40, right: 0, width: 320, background: T.surface, border: `1px solid ${T.border}`, borderRadius: 12, boxShadow: "0 8px 32px rgba(0,0,0,0.4)", zIndex: 200, overflow: "hidden" }}>
                    <div style={{ padding: "12px 16px", borderBottom: `1px solid ${T.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontWeight: 700, fontSize: 15 }}>Notifications</span>
                        <button onClick={onClose} style={{ background: "none", border: "none", color: T.textSub, cursor: "pointer" }}><Icon name="close" size={18} /></button>
                    </div>
                    {notifs.map(n => (
                        <div key={n.id} style={{ padding: "12px 16px", display: "flex", gap: 10, borderBottom: `1px solid ${T.border}`, background: n.unread ? `${T.accent}08` : "transparent", cursor: "pointer" }}
                            onMouseEnter={e => e.currentTarget.style.background = T.hover}
                            onMouseLeave={e => e.currentTarget.style.background = n.unread ? `${T.accent}08` : "transparent"}>
                            <div style={{ position: "relative" }}>
                                <img src={n.avatar} style={{ width: 36, height: 36, borderRadius: "50%", flexShrink: 0 }} alt="" />
                                {n.unread && <div style={{ position: "absolute", top: 0, right: 0, width: 8, height: 8, background: T.accent, borderRadius: "50%", border: `2px solid ${T.surface}` }} />}
                            </div>
                            <div style={{ flex: 1 }}>
                                <div style={{ fontSize: 13, lineHeight: 1.5 }}>{n.text}</div>
                                <div style={{ fontSize: 11, color: T.textSub, marginTop: 3 }}>{n.time}</div>
                            </div>
                        </div>
                    ))}
                    <div style={{ padding: "12px 16px", textAlign: "center" }}>
                        <span style={{ fontSize: 13, color: T.accent, cursor: "pointer", fontWeight: 600 }}>See all notifications</span>
                    </div>
                </div>
            );
        }

        // ============================================================
        // MAIN APP
        // ============================================================
        function IndiaTube() {
            const [darkMode, setDarkMode] = useState(true);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [page, setPage] = useState("home");
            const [selectedVideo, setSelectedVideo] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeCategory, setActiveCategory] = useState("All");
            const [profileUserId, setProfileUserId] = useState(null);
            const [toast, setToast] = useState(null);
            const [notifications, setNotifications] = useState([]);
            const [showNotifications, setShowNotifications] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const initApp = async () => {
                    await FirebaseDB.init();
                    setLoading(false);
                };
                initApp();
            }, []);

            const showToast = useCallback((msg, type = "success") => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            }, []);

            const navigate = useCallback((p, opts = {}) => {
                setPage(p);
                setSidebarOpen(false);
                if (opts.video) setSelectedVideo(opts.video);
                if (opts.userId) setProfileUserId(opts.userId);
                if (opts.query !== undefined) setSearchQuery(opts.query);
                window.scrollTo(0, 0);
            }, []);

            const theme = {
                bg: darkMode ? "#0f0f0f" : "#f9f9f9",
                surface: darkMode ? "#1a1a1a" : "#ffffff",
                surface2: darkMode ? "#272727" : "#f2f2f2",
                border: darkMode ? "#3f3f3f" : "#e5e5e5",
                text: darkMode ? "#f1f1f1" : "#0f0f0f",
                textSub: darkMode ? "#aaaaaa" : "#606060",
                accent: "#ff0000",
                accentHover: "#cc0000",
                hover: darkMode ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.05)",
            };

            const T = theme;

            if (loading) {
                return (
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: T.bg, color: T.text }}>
                        <div style={{ textAlign: "center" }}>
                            <div style={{ background: "#ff0000", borderRadius: 12, padding: "12px 24px", display: "inline-flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
                                <Icon name="play" size={32} />
                                <span style={{ fontWeight: 800, fontSize: 24 }}>IndiaTube</span>
                            </div>
                            <div className="pulse" style={{ fontSize: 14, color: T.textSub }}>Loading your experience...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ background: T.bg, color: T.text, minHeight: "100vh", fontFamily: "'Segoe UI', system-ui, sans-serif", transition: "background 0.3s, color 0.3s" }}>
                    {/* TOP NAV */}
                    <nav style={{ position: "fixed", top: 0, left: 0, right: 0, height: 56, background: T.bg, borderBottom: `1px solid ${T.border}`, display: "flex", alignItems: "center", padding: "0 16px", gap: 12, zIndex: 100, backdropFilter: "blur(10px)" }}>
                        <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "none", color: T.text, cursor: "pointer", padding: 8, borderRadius: "50%", display: "flex" }}>
                            <Icon name="menu" size={22} />
                        </button>
                        <div onClick={() => navigate("home")} style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer", flexShrink: 0 }}>
                            <div style={{ background: "#ff0000", borderRadius: 8, padding: "4px 8px", display: "flex", alignItems: "center" }}>
                                <Icon name="play" size={18} className="" />
                            </div>
                            <span style={{ fontWeight: 800, fontSize: 18, letterSpacing: -0.5 }}>India<span style={{ color: "#ff0000" }}>Tube</span></span>
                            <span style={{ fontSize: 10, color: T.textSub, fontWeight: 600, background: T.surface2, padding: "1px 4px", borderRadius: 4 }}>IN</span>
                        </div>

                        <div className="desktop-only" style={{ flex: 1, maxWidth: 600, display: "flex", gap: 0 }}>
                            <input
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                                onKeyDown={e => e.key === "Enter" && searchQuery && navigate("search", { query: searchQuery })}
                                placeholder="Search videos, channels..."
                                style={{ flex: 1, background: T.surface2, border: `1px solid ${T.border}`, borderRight: "none", borderRadius: "20px 0 0 20px", padding: "8px 16px", color: T.text, outline: "none", fontSize: 14 }}
                            />
                            <button onClick={() => searchQuery && navigate("search", { query: searchQuery })} style={{ background: T.surface2, border: `1px solid ${T.border}`, borderLeft: "none", borderRadius: "0 20px 20px 0", padding: "8px 16px", color: T.textSub, cursor: "pointer", display: "flex", alignItems: "center" }}>
                                <Icon name="search" size={18} />
                            </button>
                        </div>

                        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>
                            <button onClick={() => navigate("search", { query: "" })} className="mobile-only" style={{ background: "none", border: "none", color: T.text, cursor: "pointer", padding: 8, borderRadius: "50%", display: "flex" }}>
                                <Icon name="search" size={22} />
                            </button>
                            <button onClick={() => setDarkMode(!darkMode)} style={{ background: "none", border: "none", color: T.text, cursor: "pointer", padding: 8, borderRadius: "50%", display: "flex" }}>
                                <Icon name={darkMode ? "sun" : "moon"} size={20} />
                            </button>
                            {currentUser && (
                                <>
                                    <button onClick={() => navigate("upload")} style={{ background: "none", border: "none", color: T.text, cursor: "pointer", padding: 8, borderRadius: "50%", display: "flex" }}>
                                        <Icon name="upload" size={22} />
                                    </button>
                                    <div style={{ position: "relative" }}>
                                        <button onClick={() => setShowNotifications(!showNotifications)} style={{ background: "none", border: "none", color: T.text, cursor: "pointer", padding: 8, borderRadius: "50%", display: "flex" }}>
                                            <Icon name="bell" size={22} />
                                            <span className="notif-badge">3</span>
                                        </button>
                                        {showNotifications && <NotificationsPanel T={T} onClose={() => setShowNotifications(false)} navigate={navigate} />}
                                    </div>
                                    <img src={currentUser.avatar} onClick={() => navigate("profile", { userId: currentUser.id })} style={{ width: 32, height: 32, borderRadius: "50%", cursor: "pointer", border: `2px solid ${T.accent}` }} alt="avatar" />
                                </>
                            )}
                            {!currentUser && (
                                <button onClick={() => navigate("login")} style={{ background: "none", border: `1px solid #3ea6ff`, color: "#3ea6ff", borderRadius: 18, padding: "6px 14px", cursor: "pointer", fontSize: 14, fontWeight: 500, display: "flex", alignItems: "center", gap: 6 }}>
                                    <Icon name="india" size={16} /> Sign In
                                </button>
                            )}
                        </div>
                    </nav>

                    {sidebarOpen && <div className="sidebar-overlay" onClick={() => setSidebarOpen(false)} />}

                    <aside className={sidebarOpen ? "slide-in" : ""} style={{
                        position: "fixed", top: 0, left: sidebarOpen ? 0 : -240, width: 240, height: "100vh", background: T.bg, borderRight: `1px solid ${T.border}`,
                        zIndex: 101, paddingTop: 64, overflowY: "auto", transition: "left 0.3s ease"
                    }}>
                        <SidebarContent T={T} navigate={navigate} page={page} currentUser={currentUser} onClose={() => setSidebarOpen(false)} />
                    </aside>

                    <main style={{ paddingTop: 56, minHeight: "100vh" }}>
                        {page === "home" && <HomePage T={T} navigate={navigate} activeCategory={activeCategory} setActiveCategory={setActiveCategory} currentUser={currentUser} showToast={showToast} />}
                        {page === "watch" && selectedVideo && <WatchPage T={T} video={selectedVideo} navigate={navigate} currentUser={currentUser} showToast={showToast} />}
                        {page === "shorts" && <ShortsPage T={T} navigate={navigate} currentUser={currentUser} showToast={showToast} />}
                        {page === "profile" && <ProfilePage T={T} userId={profileUserId || (currentUser?.id)} navigate={navigate} currentUser={currentUser} showToast={showToast} />}
                        {page === "upload" && <UploadPage T={T} navigate={navigate} currentUser={currentUser} showToast={showToast} />}
                        {page === "login" && <LoginPage T={T} navigate={navigate} setCurrentUser={setCurrentUser} showToast={showToast} />}
                        {page === "search" && <SearchPage T={T} query={searchQuery} setQuery={setSearchQuery} navigate={navigate} currentUser={currentUser} showToast={showToast} />}
                    </main>

                    {toast && (
                        <div className="fade-in" style={{ position: "fixed", bottom: 80, left: "50%", transform: "translateX(-50%)", background: toast.type === "error" ? "#c00" : "#333", color: "#fff", padding: "10px 20px", borderRadius: 8, zIndex: 999, fontSize: 14, maxWidth: 300, textAlign: "center", boxShadow: "0 4px 12px rgba(0,0,0,0.4)" }}>
                            {toast.msg}
                        </div>
                    )}

                    <div className="mobile-only" style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: T.bg, borderTop: `1px solid ${T.border}`, display: "flex", zIndex: 100 }}>
                        {[["home","Home","home"],["fire","Trending","home"],["shorts","Shorts","shorts"],["subscribe","Subscriptions","profile"],["library","Library","profile"]].map(([icon, label, p]) => (
                            <button key={icon} onClick={() => navigate(p)} style={{ flex: 1, background: "none", border: "none", color: page === p ? T.accent : T.textSub, cursor: "pointer", padding: "10px 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, fontSize: 10 }}>
                                <Icon name={icon} size={20} />
                                {label}
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.createRoot(document.getElementById('root')).render(<IndiaTube />);
    </script>
</body>
</html>
