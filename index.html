        // ============================================================
        // VIDEO CARD Component
        // ============================================================
        function VideoCard({ video, T, navigate, currentUser, showToast, horizontal = false }) {
            const [saved, setSaved] = useState(false);

            useEffect(() => {
                const checkSaved = async () => {
                    if (currentUser) {
                        const watchLater = await FirebaseDB.getWatchLater(currentUser.id);
                        setSaved(!!watchLater.find(v => v.id === video.id));
                    }
                };
                checkSaved();
            }, [currentUser, video.id]);

            const handleSaveLater = async (e) => {
                e.stopPropagation();
                if (!currentUser) {
                    showToast("Sign in to save videos", "error");
                    return;
                }
                const updated = await FirebaseDB.toggleWatchLater(currentUser.id, video);
                setSaved(!!updated.find(v => v.id === video.id));
                showToast(saved ? "Removed from Watch Later" : "Saved to Watch Later");
            };

            if (horizontal) {
                return (
                    <div onClick={() => navigate("watch", { video })} className="hover-scale btn-press" style={{ display: "flex", gap: 10, cursor: "pointer", padding: "8px 0" }}>
                        <div style={{ position: "relative", flexShrink: 0, width: 160, height: 90, borderRadius: 8, overflow: "hidden" }}>
                            <img src={video.thumbnail} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="" loading="lazy" />
                            <span style={{ position: "absolute", bottom: 4, right: 4, background: "rgba(0,0,0,0.8)", color: "#fff", fontSize: 11, padding: "1px 4px", borderRadius: 3 }}>{video.duration}</span>
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontWeight: 600, fontSize: 13, lineHeight: 1.4, marginBottom: 4, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{video.title}</div>
                            <div style={{ fontSize: 12, color: T.textSub }}>{video.channelName}</div>
                            <div style={{ fontSize: 12, color: T.textSub }}>{formatViews(video.views)} views • {formatDate(video.uploadDate)}</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fade-in" style={{ cursor: "pointer" }}>
                    <div onClick={() => navigate("watch", { video })} style={{ position: "relative", borderRadius: 12, overflow: "hidden", aspectRatio: "16/9" }} className="hover-scale">
                        <img src={video.thumbnail} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="" loading="lazy" />
                        <span style={{ position: "absolute", bottom: 6, right: 6, background: "rgba(0,0,0,0.85)", color: "#fff", fontSize: 12, padding: "2px 6px", borderRadius: 4, fontWeight: 600 }}>{video.duration}</span>
                        <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0)", display: "flex", alignItems: "center", justifyContent: "center", opacity: 0, transition: "all 0.2s" }}
                            onMouseEnter={e => { e.currentTarget.style.background = "rgba(0,0,0,0.3)"; e.currentTarget.style.opacity = "1"; }}
                            onMouseLeave={e => { e.currentTarget.style.background = "rgba(0,0,0,0)"; e.currentTarget.style.opacity = "0"; }}>
                            <div style={{ background: "rgba(255,255,255,0.9)", borderRadius: "50%", width: 48, height: 48, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                <Icon name="play" size={24} />
                            </div>
                        </div>
                    </div>
                    <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                        <img src={(() => { 
                            const user = MOCK_USERS.find(u => u.id === video.channelId);
                            return user?.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${video.channelName}`;
                        })()} style={{ width: 36, height: 36, borderRadius: "50%", cursor: "pointer", flexShrink: 0 }} onClick={() => navigate("profile", { userId: video.channelId })} alt="" />
                        <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontWeight: 600, fontSize: 14, lineHeight: 1.4, marginBottom: 4, cursor: "pointer", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }} onClick={() => navigate("watch", { video })}>{video.title}</div>
                            <div style={{ fontSize: 13, color: T.textSub, cursor: "pointer" }} onClick={() => navigate("profile", { userId: video.channelId })}>{video.channelName}</div>
                            <div style={{ fontSize: 13, color: T.textSub }}>{formatViews(video.views)} views • {formatDate(video.uploadDate)}</div>
                        </div>
                        <button onClick={handleSaveLater} style={{ background: "none", border: "none", color: saved ? T.accent : T.textSub, cursor: "pointer", padding: 4, flexShrink: 0, display: "flex" }}>
                            <Icon name="watchlater" size={18} />
                        </button>
                    </div>
                </div>
            );
        }

        // ============================================================
        // HOME PAGE
        // ============================================================
        function HomePage({ T, navigate, activeCategory, setActiveCategory, currentUser, showToast }) {
            const [videos, setVideos] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchVideos = async () => {
                    setLoading(true);
                    try {
                        let vids = await FirebaseDB.getVideos();
                        vids = vids.filter(v => !v.isShort);
                        if (activeCategory !== "All") vids = vids.filter(v => v.category === activeCategory);
                        setVideos(vids);
                    } catch (error) {
                        console.error("Error fetching videos:", error);
                        showToast("Failed to load videos", "error");
                    }
                    setLoading(false);
                };
                fetchVideos();
            }, [activeCategory]);

            return (
                <div style={{ padding: "16px 16px 80px" }}>
                    {/* Category Pills */}
                    <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 12, marginBottom: 16, scrollbarWidth: "none" }}>
                        {CATEGORIES.map(cat => (
                            <button key={cat} onClick={() => setActiveCategory(cat)} style={{
                                flexShrink: 0, padding: "6px 14px", borderRadius: 20, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 500, transition: "all 0.2s",
                                background: activeCategory === cat ? T.text : T.surface2, color: activeCategory === cat ? T.bg : T.text
                            }}>{cat}</button>
                        ))}
                    </div>

                    {/* Featured Banner */}
                    {activeCategory === "All" && videos[0] && !loading && (
                        <div onClick={() => navigate("watch", { video: videos[0] })} className="hover-scale" style={{ position: "relative", borderRadius: 16, overflow: "hidden", marginBottom: 24, cursor: "pointer", aspectRatio: "16/9", maxHeight: 400 }}>
                            <img src={videos[0].thumbnail} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="" />
                            <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%)" }} />
                            <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: 20 }}>
                                <span style={{ background: T.accent, color: "#fff", fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 4, marginBottom: 8, display: "inline-block" }}>🔥 TRENDING</span>
                                <div style={{ fontWeight: 700, fontSize: 18, color: "#fff", lineHeight: 1.3 }}>{videos[0].title}</div>
                                <div style={{ fontSize: 13, color: "rgba(255,255,255,0.7)", marginTop: 4 }}>{videos[0].channelName} • {formatViews(videos[0].views)} views</div>
                            </div>
                        </div>
                    )}

                    {loading ? (
                        <div className="video-grid">
                            {[...Array(8)].map((_, i) => (
                                <div key={i}>
                                    <div className="skeleton" style={{ aspectRatio: "16/9", borderRadius: 12 }} />
                                    <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                                        <div className="skeleton" style={{ width: 36, height: 36, borderRadius: "50%", flexShrink: 0 }} />
                                        <div style={{ flex: 1 }}>
                                            <div className="skeleton" style={{ height: 14, marginBottom: 6, borderRadius: 4 }} />
                                            <div className="skeleton" style={{ height: 12, width: "60%", borderRadius: 4 }} />
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="video-grid fade-in">
                            {videos.slice(activeCategory === "All" ? 1 : 0).map(video => (
                                <VideoCard key={video.id} video={video} T={T} navigate={navigate} currentUser={currentUser} showToast={showToast} />
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // WATCH PAGE
        // ============================================================
        function WatchPage({ T, video, navigate, currentUser, showToast }) {
            const [liked, setLiked] = useState(false);
            const [disliked, setDisliked] = useState(false);
            const [likes, setLikes] = useState(video.likes);
            const [subscribed, setSubscribed] = useState(false);
            const [comment, setComment] = useState("");
            const [comments, setComments] = useState([]);
            const [showDesc, setShowDesc] = useState(false);
            const [relatedVideos, setRelatedVideos] = useState([]);
            const [isPlaying, setIsPlaying] = useState(false);
            const [volume, setVolume] = useState(80);
            const [muted, setMuted] = useState(false);
            const [progress, setProgress] = useState(0);
            const [duration, setDuration] = useState(0);
            const [currentTime, setCurrentTime] = useState(0);
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [showControls, setShowControls] = useState(true);
            const [aiLoading, setAiLoading] = useState(false);
            const [aiSummary, setAiSummary] = useState("");
            const videoRef = useRef(null);
            const controlsTimer = useRef(null);

            useEffect(() => {
                const loadData = async () => {
                    const vid = await FirebaseDB.getVideo(video.id);
                    if (vid) setComments(vid.comments || []);
                    
                    const vids = await FirebaseDB.getVideos();
                    setRelatedVideos(vids.filter(v => v.id !== video.id && !v.isShort).slice(0, 8));

                    if (currentUser) {
                        await FirebaseDB.addToHistory(currentUser.id, video);
                        const subs = await FirebaseDB.getSubscriptions(currentUser.id);
                        setSubscribed(subs.includes(video.channelId));
                        const status = await FirebaseDB.getLikeStatus(currentUser.id, video.id);
                        setLiked(status === "like");
                        setDisliked(status === "dislike");
                    }
                };
                loadData();
            }, [video.id]);

            const handleLike = async () => {
                if (!currentUser) { showToast("Sign in to like videos", "error"); return; }
                const newStatus = await FirebaseDB.toggleLike(currentUser.id, video.id, liked ? "like" : null);
                if (newStatus === "like") {
                    setLiked(true);
                    setDisliked(false);
                    setLikes(l => l + 1);
                } else {
                    setLiked(false);
                    setLikes(l => l - 1);
                }
            };

            const handleDislike = async () => {
                if (!currentUser) { showToast("Sign in to rate videos", "error"); return; }
                const newStatus = await FirebaseDB.toggleDislike(currentUser.id, video.id, disliked ? "dislike" : null);
                if (newStatus === "dislike") {
                    setDisliked(true);
                    if (liked) {
                        setLiked(false);
                        setLikes(l => l - 1);
                    }
                } else {
                    setDisliked(false);
                }
            };

            const handleSubscribe = async () => {
                if (!currentUser) { showToast("Sign in to subscribe", "error"); return; }
                const updated = await FirebaseDB.toggleSubscription(currentUser.id, video.channelId);
                setSubscribed(updated.includes(video.channelId));
                showToast(subscribed ? "Unsubscribed" : "Subscribed! 🔔");
            };

            const handleComment = async () => {
                if (!currentUser) { showToast("Sign in to comment", "error"); return; }
                if (!comment.trim()) return;
                const newComment = { 
                    id: "c_" + Date.now(), 
                    userId: currentUser.id, 
                    username: currentUser.username, 
                    avatar: currentUser.avatar, 
                    text: comment.trim(), 
                    likes: 0, 
                    date: new Date().toISOString().split("T")[0] 
                };
                await FirebaseDB.addComment(video.id, newComment);
                setComments([newComment, ...comments]);
                setComment("");
                showToast("Comment posted!");
            };

            const handleAISummary = async () => {
                setAiLoading(true);
                try {
                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 1000,
                            messages: [{
                                role: "user",
                                content: `Generate a brief, engaging AI summary for this YouTube-style video:\nTitle: "${video.title}"\nChannel: ${video.channelName}\nCategory: ${video.category}\nDescription: ${video.description}\nViews: ${formatViews(video.views)}\n\nProvide: 1) A 2-3 sentence summary of what viewers can expect, 2) Key highlights/topics covered, 3) Why this is trending/popular. Keep it concise and helpful for Indian viewers.`
                            }]
                        })
                    });
                    const data = await response.json();
                    setAiSummary(data.content?.[0]?.text || "Summary unavailable.");
                } catch {
                    setAiSummary("AI summary temporarily unavailable. Please try again.");
                }
                setAiLoading(false);
            };

            const formatTime = (s) => {
                const m = Math.floor(s / 60), sec = Math.floor(s % 60);
                return `${m}:${sec.toString().padStart(2, "0")}`;
            };

            const handleVideoClick = () => {
                if (videoRef.current) {
                    if (isPlaying) { videoRef.current.pause(); setIsPlaying(false); }
                    else { videoRef.current.play(); setIsPlaying(true); }
                }
                setShowControls(true);
                clearTimeout(controlsTimer.current);
                controlsTimer.current = setTimeout(() => setShowControls(false), 3000);
            };

            const [channel, setChannel] = useState({ username: video.channelName, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${video.channelName}`, subscribers: 0 });

            useEffect(() => {
                const fetchChannel = async () => {
                    const user = await FirebaseDB.getUser(video.channelId);
                    if (user) setChannel(user);
                };
                fetchChannel();
            }, [video.channelId]);

            return (
                <div style={{ display: "flex", gap: 24, padding: "16px 16px 80px", maxWidth: 1600, margin: "0 auto", flexWrap: "wrap" }}>
                    <div style={{ flex: "1 1 640px", minWidth: 0 }}>
                        <div style={{ position: "relative", borderRadius: isFullscreen ? 0 : 12, overflow: "hidden", background: "#000", aspectRatio: "16/9" }}
                            onMouseMove={() => { setShowControls(true); clearTimeout(controlsTimer.current); controlsTimer.current = setTimeout(() => setShowControls(false), 3000); }}>
                            <video
                                ref={videoRef}
                                src={video.videoUrl}
                                style={{ width: "100%", height: "100%", objectFit: "contain" }}
                                onTimeUpdate={e => { setCurrentTime(e.target.currentTime); setProgress(e.target.duration ? (e.target.currentTime / e.target.duration) * 100 : 0); }}
                                onLoadedMetadata={e => setDuration(e.target.duration)}
                                onEnded={() => setIsPlaying(false)}
                                onClick={handleVideoClick}
                            />

                            {!isPlaying && (
                                <div onClick={handleVideoClick} style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
                                    <div style={{ background: "rgba(0,0,0,0.7)", borderRadius: "50%", width: 64, height: 64, display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(4px)" }}>
                                        <Icon name="play" size={32} />
                                    </div>
                                </div>
                            )}

                            <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "linear-gradient(transparent, rgba(0,0,0,0.8))", padding: "40px 16px 12px", opacity: showControls ? 1 : 0, transition: "opacity 0.3s" }}>
                                <input type="range" min={0} max={100} value={progress} onChange={e => {
                                    const p = Number(e.target.value);
                                    if (videoRef.current && duration) { videoRef.current.currentTime = (p / 100) * duration; setProgress(p); }
                                }} className="range-input" style={{ width: "100%", marginBottom: 8, background: `linear-gradient(to right, #ff0000 ${progress}%, #555 ${progress}%)` }} />
                                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                    <button onClick={handleVideoClick} style={{ background: "none", border: "none", color: "#fff", cursor: "pointer", display: "flex" }}>
                                        <Icon name={isPlaying ? "pause" : "play"} size={22} />
                                    </button>
                                    <button onClick={() => { setMuted(!muted); if (videoRef.current) videoRef.current.muted = !muted; }} style={{ background: "none", border: "none", color: "#fff", cursor: "pointer", display: "flex" }}>
                                        <Icon name={muted ? "mute" : "volume"} size={22} />
                                    </button>
                                    <input type="range" min={0} max={100} value={muted ? 0 : volume} onChange={e => {
                                        const v = Number(e.target.value);
                                        setVolume(v); setMuted(false);
                                        if (videoRef.current) videoRef.current.volume = v / 100;
                                    }} className="range-input" style={{ width: 80, background: `linear-gradient(to right, #fff ${muted ? 0 : volume}%, #555 ${muted ? 0 : volume}%)` }} />
                                    <span style={{ color: "#fff", fontSize: 12, marginLeft: 4 }}>{formatTime(currentTime)} / {formatTime(duration)}</span>
                                    <div style={{ marginLeft: "auto" }}>
                                        <button onClick={() => {
                                            if (!document.fullscreenElement && videoRef.current?.closest) {
                                                videoRef.current.closest("div")?.requestFullscreen?.();
                                            } else document.exitFullscreen?.();
                                            setIsFullscreen(!isFullscreen);
                                        }} style={{ background: "none", border: "none", color: "#fff", cursor: "pointer", display: "flex" }}>
                                            <Icon name="fullscreen" size={22} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div style={{ marginTop: 12 }}>
                            <h1 style={{ fontSize: 18, fontWeight: 700, lineHeight: 1.4, marginBottom: 12 }}>{video.title}</h1>
                            
                            <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
                                <div style={{ display: "flex", background: T.surface2, borderRadius: 20, overflow: "hidden" }}>
                                    <button onClick={handleLike} style={{ background: "none", border: "none", color: liked ? T.accent : T.text, cursor: "pointer", padding: "8px 16px", display: "flex", alignItems: "center", gap: 6, fontSize: 14, fontWeight: 600, borderRight: `1px solid ${T.border}` }}>
                                        <Icon name="like" size={18} /> {formatCount(likes)}
                                    </button>
                                    <button onClick={handleDislike} style={{ background: "none", border: "none", color: disliked ? T.textSub : T.text, cursor: "pointer", padding: "8px 16px", display: "flex", alignItems: "center", gap: 6, fontSize: 14 }}>
                                        <Icon name="dislike" size={18} />
                                    </button>
                                </div>
                                <button onClick={() => showToast("Link copied to clipboard! 📋")} style={{ background: T.surface2, border: "none", color: T.text, cursor: "pointer", padding: "8px 16px", borderRadius: 20, display: "flex", alignItems: "center", gap: 6, fontSize: 14, fontWeight: 600 }}>
                                    <Icon name="share" size={18} /> Share
                                </button>
                                <button onClick={async () => {
                                    if (!currentUser) { showToast("Sign in to save", "error"); return; }
                                    const updated = await FirebaseDB.toggleWatchLater(currentUser.id, video);
                                    showToast(updated.find(v => v.id === video.id) ? "Saved to Watch Later ✅" : "Removed from Watch Later");
                                }} style={{ background: T.surface2, border: "none", color: T.text, cursor: "pointer", padding: "8px 16px", borderRadius: 20, display: "flex", alignItems: "center", gap: 6, fontSize: 14, fontWeight: 600 }}>
                                    <Icon name="watchlater" size={18} /> Save
                                </button>
                                <button onClick={handleAISummary} style={{ background: "linear-gradient(135deg, #ff0000, #cc0044)", border: "none", color: "#fff", cursor: "pointer", padding: "8px 16px", borderRadius: 20, display: "flex", alignItems: "center", gap: 6, fontSize: 14, fontWeight: 600 }}>
                                    ✨ AI Summary
                                </button>
                            </div>

                            {(aiLoading || aiSummary) && (
                                <div style={{ background: T.surface2, borderRadius: 12, padding: 16, marginBottom: 16, borderLeft: `3px solid ${T.accent}` }}>
                                    <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 8, color: T.accent }}>✨ AI Summary by IndiaTube</div>
                                    {aiLoading ? <div className="pulse" style={{ color: T.textSub, fontSize: 13 }}>Generating AI summary...</div> : <div style={{ fontSize: 13, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{aiSummary}</div>}
                                </div>
                            )}

                            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderTop: `1px solid ${T.border}`, borderBottom: `1px solid ${T.border}`, marginBottom: 16 }}>
                                <img src={channel.avatar} onClick={() => navigate("profile", { userId: video.channelId })} style={{ width: 42, height: 42, borderRadius: "50%", cursor: "pointer", border: `2px solid ${T.accent}` }} alt="" />
                                <div style={{ flex: 1 }}>
                                    <div style={{ fontWeight: 700, cursor: "pointer" }} onClick={() => navigate("profile", { userId: video.channelId })}>{channel.username}</div>
                                    <div style={{ fontSize: 12, color: T.textSub }}>{formatCount(channel.subscribers)} subscribers</div>
                                </div>
                                <button onClick={handleSubscribe} style={{ background: subscribed ? T.surface2 : T.accent, color: subscribed ? T.text : "#fff", border: "none", borderRadius: 20, padding: "8px 18px", cursor: "pointer", fontSize: 14, fontWeight: 700, transition: "all 0.2s" }}>
                                    {subscribed ? "✓ Subscribed" : "Subscribe"}
                                </button>
                            </div>

                            <div style={{ background: T.surface2, borderRadius: 12, padding: "12px 16px", marginBottom: 16, cursor: "pointer" }} onClick={() => setShowDesc(!showDesc)}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <span style={{ fontSize: 13, fontWeight: 600 }}>{formatViews(video.views)} views • {formatDate(video.uploadDate)}</span>
                                    <span style={{ fontSize: 12, color: T.textSub }}>{showDesc ? "▲ Less" : "▼ More"}</span>
                                </div>
                                {showDesc && <div style={{ marginTop: 10, fontSize: 13, lineHeight: 1.7, color: T.text }}>{video.description}<br/><br/><span style={{ color: T.textSub }}>{video.tags.map(t => "#" + t).join(" ")}</span></div>}
                            </div>

                            <div>
                                <h3 style={{ fontWeight: 700, marginBottom: 16 }}>{comments.length} Comments</h3>
                                {currentUser && (
                                    <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
                                        <img src={currentUser.avatar} style={{ width: 36, height: 36, borderRadius: "50%", flexShrink: 0 }} alt="" />
                                        <div style={{ flex: 1 }}>
                                            <input value={comment} onChange={e => setComment(e.target.value)} onKeyDown={e => e.key === "Enter" && handleComment()} placeholder="Add a comment..." style={{ width: "100%", background: "none", border: "none", borderBottom: `1px solid ${T.border}`, padding: "8px 0", color: T.text, outline: "none", fontSize: 14 }} />
                                            {comment && (
                                                <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
                                                    <button onClick={() => setComment("")} style={{ background: "none", border: "none", color: T.textSub, cursor: "pointer", padding: "6px 12px", borderRadius: 20, fontSize: 13 }}>Cancel</button>
                                                    <button onClick={handleComment} style={{ background: T.accent, color: "#fff", border: "none", borderRadius: 20, padding: "6px 16px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>Comment</button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                                {comments.map(c => (
                                    <div key={c.id} style={{ display: "flex", gap: 12, marginBottom: 16 }}>
                                        <img src={c.avatar} style={{ width: 36, height: 36, borderRadius: "50%", flexShrink: 0 }} alt="" />
                                        <div style={{ flex: 1 }}>
                                            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
                                                <span style={{ fontWeight: 600, fontSize: 13 }}>{c.username}</span>
                                                <span style={{ fontSize: 12, color: T.textSub }}>{formatDate(c.date)}</span>
                                            </div>
                                            <div style={{ fontSize: 14, lineHeight: 1.6 }}>{c.text}</div>
                                            <div style={{ display: "flex", gap: 12, marginTop: 6 }}>
                                                <button style={{ background: "none", border: "none", color: T.textSub, cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", gap: 4 }}><Icon name="like" size={14} />{c.likes}</button>
                                                <button style={{ background: "none", border: "none", color: T.textSub, cursor: "pointer", fontSize: 12 }}>Reply</button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div style={{ width: 360, flexShrink: 0 }} className="desktop-only">
                        <h3 style={{ fontWeight: 700, marginBottom: 12, fontSize: 15 }}>Up Next</h3>
                        {relatedVideos.map(v => (
                            <VideoCard key={v.id} video={v} T={T} navigate={navigate} currentUser={currentUser} showToast={showToast} horizontal />
                        ))}
                    </div>
                </div>
            );
        }

        // ============================================================
        // SHORTS PAGE
        // ============================================================
        function ShortsPage({ T, navigate, currentUser, showToast }) {
            const [shorts, setShorts] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const containerRef = useRef(null);
            const [liked, setLiked] = useState({});

            useEffect(() => {
                const fetchShorts = async () => {
                    const s = await FirebaseDB.getShorts();
                    setShorts(s);
                };
                fetchShorts();
            }, []);

            const handleScroll = useCallback(() => {
                if (containerRef.current) {
                    const idx = Math.round(containerRef.current.scrollTop / window.innerHeight);
                    setCurrentIdx(idx);
                }
            }, []);

            if (!shorts.length) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "80vh", color: T.textSub }}>Loading Shorts…</div>;

            return (
                <div ref={containerRef} onScroll={handleScroll} className="shorts-scroll" style={{ height: "calc(100vh - 56px)" }}>
                    {shorts.map((short, idx) => (
                        <div key={short.id} className="short-item" style={{ height: "calc(100vh - 56px)", display: "flex", alignItems: "center", justifyContent: "center", background: "#000", position: "relative" }}>
                            <ShortItem short={short} isActive={idx === currentIdx} T={T} navigate={navigate} currentUser={currentUser} showToast={showToast} liked={liked[short.id]} onLike={() => setLiked(l => ({ ...l, [short.id]: !l[short.id] }))} />
                        </div>
                    ))}
                </div>
            );
        }

        function ShortItem({ short, isActive, T, navigate, currentUser, showToast, liked, onLike }) {
            const videoRef = useRef(null);
            const [isPlaying, setIsPlaying] = useState(false);

            useEffect(() => {
                if (videoRef.current) {
                    if (isActive) { videoRef.current.play().then(() => setIsPlaying(true)).catch(() => {}); }
                    else { videoRef.current.pause(); setIsPlaying(false); }
                }
            }, [isActive]);

            return (
                <div style={{ position: "relative", height: "100%", maxWidth: 400, width: "100%", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <video ref={videoRef} src={short.videoUrl} loop playsInline style={{ maxHeight: "100%", maxWidth: "100%", objectFit: "contain", borderRadius: 12 }}
                        onClick={() => { if (videoRef.current) { if (isPlaying) { videoRef.current.pause(); setIsPlaying(false); } else { videoRef.current.play(); setIsPlaying(true); } } }} />

                    <div style={{ position: "absolute", bottom: 60, left: 16, right: 70 }}>
                        <div style={{ fontWeight: 700, color: "#fff", marginBottom: 4, textShadow: "0 2px 4px rgba(0,0,0,0.5)" }}>@{short.channelName}</div>
                        <div style={{ color: "rgba(255,255,255,0.9)", fontSize: 14, textShadow: "0 2px 4px rgba(0,0,0,0.5)" }}>{short.title}</div>
                    </div>

                    <div style={{ position: "absolute", right: 8, bottom: 80, display: "flex", flexDirection: "column", gap: 20 }}>
                        {[
                            { icon: "like", label: liked ? "♥" : formatCount(short.likes + (liked ? 1 : 0)), action: () => { if (!currentUser) { showToast("Sign in to like", "error"); return; } onLike(); }, color: liked ? "#ff6b6b" : "#fff" },
                            { icon: "comment", label: "423", action: () => showToast("Comments coming soon!") },
                            { icon: "share", label: "Share", action: () => showToast("Shared! 🔗") },
                        ].map(({ icon, label, action, color = "#fff" }) => (
                            <div key={icon} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, cursor: "pointer" }} onClick={action}>
                                <div style={{ width: 44, height: 44, background: "rgba(255,255,255,0.15)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(4px)" }}>
                                    <Icon name={icon} size={22} className="" />
                                </div>
                                <span style={{ color: "#fff", fontSize: 11, fontWeight: 600 }}>{label}</span>
                            </div>
                        ))}
                    </div>

                    {!isPlaying && (
                        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                            <div style={{ background: "rgba(0,0,0,0.5)", borderRadius: "50%", width: 60, height: 60, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                <Icon name="play" size={32} />
                            </div>
                        </div>
                    )}

                    <div style={{ position: "absolute", bottom: 10, left: "50%", transform: "translateX(-50%)", color: "rgba(255,255,255,0.5)", fontSize: 11, display: "flex", flexDirection: "column", alignItems: "center" }}>
                        <div style={{ width: 4, height: 4, borderRadius: "50%", background: "rgba(255,255,255,0.3)", margin: 2 }} />
                        Swipe up for next
                    </div>
                </div>
            );
        }

        // ============================================================
        // PROFILE PAGE
        // ============================================================
        function ProfilePage({ T, userId, navigate, currentUser, showToast }) {
            const [user, setUser] = useState(null);
            const [userVideos, setUserVideos] = useState([]);
            const [activeTab, setActiveTab] = useState("videos");
            const [subscribed, setSubscribed] = useState(false);
            const [history, setHistory] = useState([]);
            const [watchLater, setWatchLater] = useState([]);

            useEffect(() => {
                const loadData = async () => {
                    const u = await FirebaseDB.getUser(userId);
                    setUser(u);
                    if (u) {
                        const vids = await FirebaseDB.getUserVideos(u.id);
                        setUserVideos(vids);
                        if (currentUser) {
                            const subs = await FirebaseDB.getSubscriptions(currentUser.id);
                            setSubscribed(subs.includes(u.id));
                            const hist = await FirebaseDB.getHistory(currentUser.id);
                            setHistory(hist);
                            const wl = await FirebaseDB.getWatchLater(currentUser.id);
                            setWatchLater(wl);
                        }
                    }
                };
                loadData();
            }, [userId, currentUser]);

            if (!user) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "60vh" }}>
                <button onClick={() => navigate("login")} style={{ background: T.accent, color: "#fff", border: "none", borderRadius: 20, padding: "12px 24px", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>Sign In to View Profile</button>
            </div>;

            const isOwn = currentUser?.id === user.id;

            const handleSubscribe = async () => {
                if (!currentUser) { showToast("Sign in to subscribe", "error"); return; }
                const updated = await FirebaseDB.toggleSubscription(currentUser.id, user.id);
                setSubscribed(updated.includes(user.id));
                showToast(subscribed ? "Unsubscribed" : "Subscribed! 🔔");
            };

            return (
                <div style={{ maxWidth: 1200, margin: "0 auto", paddingBottom: 80 }}>
                    <div style={{ height: 180, background: `linear-gradient(135deg, ${user.banner}, #ff0000)`, position: "relative" }}>
                        <div style={{ position: "absolute", inset: 0, background: "url('https://picsum.photos/seed/banner/1200/180') center/cover", opacity: 0.3 }} />
                    </div>

                    <div style={{ padding: "0 24px" }}>
                        <div style={{ display: "flex", alignItems: "flex-end", gap: 16, marginTop: -40, marginBottom: 16, flexWrap: "wrap" }}>
                            <img src={user.avatar} style={{ width: 80, height: 80, borderRadius: "50%", border: `4px solid ${T.bg}`, position: "relative", zIndex: 1 }} alt="" />
                            <div style={{ flex: 1, paddingBottom: 8 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                                    <h1 style={{ fontSize: 22, fontWeight: 800 }}>{user.username}</h1>
                                    <span style={{ background: T.accent, color: "#fff", fontSize: 11, padding: "2px 8px", borderRadius: 12, fontWeight: 700 }}>✓ Creator</span>
                                </div>
                                <div style={{ color: T.textSub, fontSize: 13, marginTop: 4 }}>{formatCount(user.subscribers)} subscribers • {userVideos.length} videos</div>
                                <div style={{ color: T.textSub, fontSize: 13, marginTop: 2 }}>{user.bio}</div>
                            </div>
                            {!isOwn && (
                                <button onClick={handleSubscribe} style={{ background: subscribed ? T.surface2 : T.accent, color: subscribed ? T.text : "#fff", border: "none", borderRadius: 20, padding: "10px 20px", cursor: "pointer", fontSize: 14, fontWeight: 700 }}>
                                    {subscribed ? "✓ Subscribed" : "Subscribe"}
                                </button>
                            )}
                            {isOwn && (
                                <button onClick={() => navigate("upload")} style={{ background: T.accent, color: "#fff", border: "none", borderRadius: 20, padding: "10px 20px", cursor: "pointer", fontSize: 14, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
                                    <Icon name="upload" size={16} /> Upload Video
                                </button>
                            )}
                        </div>

                        <div style={{ display: "flex", gap: 0, borderBottom: `1px solid ${T.border}`, marginBottom: 20 }}>

                                    {tab === "watchlater" ? "Watch Later" : tab.charAt(0).toUpperCase() + tab.slice(1)}

                                </div>

                        {activeTab === "playlists" && (
